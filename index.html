<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas Prime Ondulados</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a56a0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Etiquetas Prime">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#e8f0f8;min-height:100vh;padding:16px 12px}
  .wrap{max-width:540px;margin:0 auto}
  .header{background:#1a56a0;border-radius:12px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
  .logo-box{background:white;border-radius:7px;padding:4px 10px;font-weight:900;font-size:17px;color:#1a56a0;flex-shrink:0}
  .header h1{color:white;font-size:16px;font-weight:700}
  .header p{color:#a8c8f0;font-size:11px;margin-top:1px}
  .card{background:white;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .step{font-weight:700;color:#1a56a0;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  input[type=file]{display:block;width:100%;padding:8px 0;font-size:13px;color:#444;cursor:pointer}
  select,input[type=number]{width:100%;padding:9px 11px;border-radius:6px;border:1.5px solid #c5d6ed;font-size:15px;color:#222;background:#f7faff;outline:none}
  select:focus,input:focus{border-color:#1a56a0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  label.lbl{display:block;font-size:10px;color:#666;font-weight:700;margin-bottom:3px;text-transform:uppercase}
  input.big{font-size:21px;font-weight:700;text-align:center}
  .preview-box{background:#f0f6ff;border-radius:7px;padding:10px 12px;font-size:12px;line-height:1.8;margin-top:8px;display:none}
  .preview-box span{color:#666}
  .btn{width:100%;padding:14px;border-radius:10px;border:none;background:#1a56a0;color:white;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 2px 8px rgba(26,86,160,.3);display:none;margin-bottom:8px}
  .btn:disabled{background:#7aabdc;cursor:default}
  .btn-sec{background:white;color:#1a56a0;box-shadow:none;border:2px solid #1a56a0}
  .msg{margin-top:8px;border-radius:7px;padding:9px 12px;font-size:13px;font-weight:600;display:none}
  .ok{background:#e8f5e9;color:#2e7d32}
  .err{background:#fdecea;color:#c62828}
  .footer{margin-top:14px;text-align:center;color:#999;font-size:11px;padding-bottom:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo-box">PRIME</div>
    <div>
      <h1>Gerador de Etiquetas</h1>
      <p>Prime Ondulados · Santa Maria do Oeste</p>
    </div>
  </div>

  <div class="card">
    <div class="step">1 · Carregar programação (xlsx)</div>
    <input type="file" id="fileXlsx" accept=".xlsx,.xls">
    <div id="msgXlsx" style="margin-top:7px;font-size:12px;color:#2e7d32;display:none"></div>
  </div>

  <div class="card" id="cardAba" style="display:none">
    <div class="step">1b · Selecionar aba</div>
    <select id="selAba"></select>
    <button onclick="carregarAba()" style="margin-top:8px;width:100%;padding:9px;border-radius:6px;border:none;background:#1a56a0;color:white;font-weight:700;font-size:14px;cursor:pointer">Carregar aba</button>
  </div>

  <div class="card" id="cardOf" style="display:none">
    <div class="step">2 · Selecionar OF</div>
    <select id="selOf"></select>
    <div class="preview-box" id="previewDados"></div>
  </div>

  <div class="card" id="cardPalete" style="display:none">
    <div class="step">3 · Dados do palete</div>
    <div class="grid2">
      <div>
        <label class="lbl">Nº do Palete</label>
        <input class="big" type="number" id="numPalete" min="1" value="1">
      </div>
      <div>
        <label class="lbl">Chapas no Palete</label>
        <input class="big" type="number" id="qtdePalete" min="1" placeholder="ex: 625">
      </div>
    </div>
  </div>

  <button class="btn" id="btnImprimir" onclick="gerarEImprimir()">🖨️ Imprimir Etiqueta</button>
  <button class="btn btn-sec" id="btnBaixar" onclick="gerarEBaixar()">⬇ Baixar PDF</button>
  <div id="msgResult" class="msg"></div>
  <div class="footer">Prime Ondulados · Gerador de Etiquetas de Palete</div>
</div>

self.addEventListener('activate', event => {
  event.waitUntil(
    caches.keys().then(keys => {
      return Promise.all(
        keys.map(key => {
          if (key !== CACHE_NAME) return caches.delete(key);
        })
      );
    })
  );
  return self.claim();
});

self.addEventListener('fetch', event => {
  event.respondWith(
    caches.match(event.request).then(cachedResponse => {
      return cachedResponse || fetch(event.request);
    })
  );
});
